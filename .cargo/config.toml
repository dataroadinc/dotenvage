[build]
jobs = 12
rustflags = ["-Dwarnings", "-Wmissing-docs"]

# Run tests single-threaded to avoid environment variable race conditions
# between test binaries that modify dimension config vars (NODE_ENV, etc.)
[registries.crates-io]
protocol = "sparse"

[net]
git-fetch-with-cli = true

[env]
RUST_TEST_THREADS = "1"
